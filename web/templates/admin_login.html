{{template "layout" .}}
{{define "content"}}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-sm border max-w-md w-full mx-4">
        <h2 class="text-xl font-bold text-center mb-6">Admin Login</h2>
        {{if .Error}}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/admin/login">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-3 border rounded-lg mb-3">
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-3 border rounded-lg mb-4">
            <button type="submit" class="w-full bg-gray-900 text-white py-3 rounded-lg hover:bg-gray-800">Login</button>
        </form>
    </div>
</div>
{{end}}
