{{template "layout" .}}
{{define "content"}}
<div class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="text-center">
        <div class="animate-pulse">
            <p class="text-lg text-gray-600 mb-4">Redirecting to payment...</p>
            <div class="w-8 h-8 border-4 border-green-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
        </div>
    </div>
</div>
<script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<script>
    const cashfree = Cashfree({ mode: "production" });
    cashfree.checkout({ paymentSessionId: "{{.PaymentSessionID}}" });
</script>
{{end}}
