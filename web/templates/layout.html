{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .Title}}{{.Title}} — {{end}}BucketCheap</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta property="og:title" content="BucketCheap — 1 TB Storage, ₹99/month">
    <meta property="og:description" content="S3-compatible object storage with unlimited bandwidth. Fair-priced for Indian developers.">
    <meta property="og:image" content="https://bucketcheap.com/static/og-image.png">
    <meta property="og:url" content="https://bucketcheap.com">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    {{template "content" .}}
</body>
</html>{{end}}
