worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    access_log off;

    # No request buffering — stream directly to rclone
    # AWS CLI multipart parts always send Content-Length, so nginx preserves it
    proxy_request_buffering off;
    proxy_buffering off;
    client_max_body_size 0;
    client_body_temp_path /tmp/nginx-body;

    server {
        listen 9000;

        location / {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Handle Expect: 100-continue — nginx responds immediately
            proxy_set_header Expect "";

            # Long timeouts for large file transfers
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }
    }
}
