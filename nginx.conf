worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    access_log off;

    # Buffer request bodies (required to preserve Content-Length for rclone)
    # AWS CLI multipart parts are 8MB each — buffers fast, no disk pressure
    proxy_request_buffering on;
    client_max_body_size 0;
    client_body_buffer_size 16m;
    client_body_temp_path /tmp/nginx-body;

    server {
        listen 9000;

        location / {
            proxy_pass http://127.0.0.1:9001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Handle Expect: 100-continue — nginx responds immediately
            proxy_set_header Expect "";

            # Long timeouts for large file transfers (1GB+ via multipart)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }
    }
}
